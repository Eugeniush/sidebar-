const GOAL_STYLE = {

function Badge({ goal }) {
  const s = GOAL_STYLE[goal] || {};
  return <span style={{ fontSize:10.5, fontWeight:600, padding:"2px 8px", borderRadius:4, background:s.bg, color:s.color, whiteSpace:"nowrap" }}>{goal}</span>;
}

function useSort(def) {
  const [sort, setSort] = useState({ col:def, dir:1 });
  const onSort = col => setSort(s => s.col===col ? { col, dir:s.dir*-1 } : { col, dir:1 });
  const sortRows = rows => [...rows].sort((a,b) => { const va=a[sort.col],vb=b[sort.col]; return va<vb?-sort.dir:va>vb?sort.dir:0; });
  return { sort, onSort, sortRows };
}

function Th({ label, col, sort, onSort, align="right" }) {
  const active = sort.col === col;
  return (
    <th onClick={() => onSort(col)} style={{ padding:"9px 14px", textAlign:align, fontSize:10, fontWeight:700, letterSpacing:"0.07em", textTransform:"uppercase", color:active?"#111827":"#6b7280", whiteSpace:"nowrap", cursor:"pointer", userSelect:"none", background:"#f5f5f1", position:"sticky", top:0, zIndex:1, borderBottom:"1px solid #e5e5e0" }}>
      {label} <span style={{ opacity:active?1:.3, fontSize:9 }}>{active?(sort.dir===1?"↓":"↑"):"↕"}</span>
    </th>
  );
}

function Td({ children, align="right", muted, mono }) {
  return <td style={{ padding:"9px 14px", textAlign:align, whiteSpace:"nowrap", color:muted?"#6b7280":"#111827", fontFamily:mono?"monospace":"inherit", fontSize:mono?11:13, fontVariantNumeric:"tabular-nums" }}>{children}</td>;
}

function TRow({ children }) {
  return <tr style={{ borderTop:"1px solid #f0f0eb", transition:"background .1s" }} onMouseEnter={e=>e.currentTarget.style.background="#f9f9f5"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>{children}</tr>;
}

function TableShell({ children }) {

}

  );
}

// ── SVG LINE CHART ────────────────────────────────────────────────────────────

function SvgChart({ data, metrics }) {
  const [tooltip, setTooltip] = useState(null);
  const W = 900, H = 220, PL = 48, PR = 20, PT = 12, PB = 32;
  const chartW = W - PL - PR;
  const chartH = H - PT - PB;

  if (!metrics.length) return (
    <div style={{ height:H, display:"flex", alignItems:"center", justifyContent:"center", color:"#9ca3af", fontSize:12 }}>
      Select at least one metric above
    </div>
  );

  // gather all values for scale
  const allVals = metrics.flatMap(m => data.map(d => d[m.key]));
  const minVal = 0;
  const maxVal = Math.max(...allVals) * 1.1;
  const scaleY = v => PT + chartH - ((v - minVal) / (maxVal - minVal)) * chartH;
  const scaleX = i => PL + (i / (data.length - 1)) * chartW;

  // Y axis ticks
  const yTicks = 5;
  const yTickVals = Array.from({ length: yTicks + 1 }, (_, i) => Math.round(minVal + (maxVal - minVal) * i / yTicks));

  const pointsFor = m => data.map((d, i) => ({ x: scaleX(i), y: scaleY(d[m.key]), val: d[m.key] }));
  const polyline = pts => pts.map(p => `${p.x},${p.y}`).join(" ");

  // smooth path
  const smoothPath = pts => {
    if (pts.length < 2) return "";
    let d = `M ${pts[0].x} ${pts[0].y}`;
    for (let i = 0; i < pts.length - 1; i++) {
      const cx = (pts[i].x + pts[i+1].x) / 2;
      d += ` C ${cx} ${pts[i].y}, ${cx} ${pts[i+1].y}, ${pts[i+1].x} ${pts[i+1].y}`;
    }
    return d;
  };

  return (
    <div style={{ position:"relative" }}>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ overflow:"visible", display:"block" }}>
        {/* Grid lines */}
        {yTickVals.map((v,i) => (
          <g key={i}>
            <line x1={PL} y1={scaleY(v)} x2={W-PR} y2={scaleY(v)} stroke="#f0f0eb" strokeWidth="1"/>
            <text x={PL-8} y={scaleY(v)+4} textAnchor="end" fontSize="10" fill="#9ca3af">{v}</text>
          </g>
        ))}

        {/* X axis line */}
        <line x1={PL} y1={H-PB} x2={W-PR} y2={H-PB} stroke="#e5e5e0" strokeWidth="1"/>
        {/* Y axis line */}
        <line x1={PL} y1={PT} x2={PL} y2={H-PB} stroke="#e5e5e0" strokeWidth="1"/>

        {/* X axis labels */}
        {data.map((d, i) => (
          <text key={i} x={scaleX(i)} y={H-PB+18} textAnchor="middle" fontSize="10" fill="#9ca3af">{d.date}</text>
        ))}

        {/* Lines */}
        {metrics.map(m => {
          const pts = pointsFor(m);
          return (
            <g key={m.key}>
              <path d={smoothPath(pts)} fill="none" stroke={m.color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
              {pts.map((p, i) => (
                <circle key={i} cx={p.x} cy={p.y} r="3.5" fill={m.color} stroke="#fff" strokeWidth="1.5"/>
              ))}
            </g>
          );
        })}

        {/* Hover zones */}
        {data.map((d, i) => (
          <rect key={i}
            x={scaleX(i) - chartW/(data.length-1)/2}
            y={PT} width={chartW/(data.length-1)} height={chartH}
            fill="transparent"
            onMouseEnter={() => setTooltip({ i, x: scaleX(i), d })}
            onMouseLeave={() => setTooltip(null)}
          />
        ))}

        {/* Vertical crosshair */}
        {tooltip && (
          <line x1={scaleX(tooltip.i)} y1={PT} x2={scaleX(tooltip.i)} y2={H-PB} stroke="#d1d5db" strokeWidth="1" strokeDasharray="4 3"/>
        )}
      </svg>

      {/* Tooltip */}
      {tooltip && (
        <div style={{ position:"absolute", top:0, left: Math.min(scaleX(tooltip.i)/W*100, 70)+"%", background:"#fff", border:"1px solid #e5e5e0", borderRadius:8, padding:"10px 14px", boxShadow:"0 4px 20px rgba(0,0,0,0.10)", fontSize:12, pointerEvents:"none", zIndex:10, minWidth:140 }}>
          <div style={{ fontWeight:700, color:"#374151", marginBottom:8, fontSize:11, textTransform:"uppercase", letterSpacing:"0.04em" }}>{tooltip.d.date}</div>
          {metrics.map(m => (
            <div key={m.key} style={{ display:"flex", alignItems:"center", gap:8, marginBottom:3 }}>
              <div style={{ width:8, height:8, borderRadius:"50%", background:m.color, flexShrink:0 }}/>
              <span style={{ color:"#9ca3af", flex:1 }}>{m.label}</span>
              <span style={{ fontWeight:600, color:"#111827", fontVariantNumeric:"tabular-nums" }}>{m.fmt(tooltip.d[m.key])}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── CAMPAIGN CHART WRAPPER ────────────────────────────────────────────────────

function CampaignChart({ activeMetrics, onToggle }) {
  const visible = METRICS.filter(m => activeMetrics.includes(m.key));
  const totals = Object.fromEntries(METRICS.map(m => [m.key, CHART_DATA.reduce((s,d)=>s+d[m.key],0)]));

  return (
    <div style={{ background:"#fff", border:"1px solid #e5e5e0", borderRadius:10, padding:"20px 24px 16px", marginBottom:24, boxShadow:"0 1px 4px rgba(0,0,0,0.05)" }}>
      {/* Toggles */}
      <div style={{ display:"flex", gap:20, flexWrap:"wrap", paddingBottom:16, marginBottom:16, borderBottom:"1px solid #f0f0eb" }}>
        {METRICS.map(m => {
          const on = activeMetrics.includes(m.key);
          return (
            <button key={m.key} onClick={() => onToggle(m.key)} style={{ background:"none", border:"none", padding:0, textAlign:"left", opacity:on?1:0.38, transition:"opacity .15s" }}>
              <div style={{ display:"flex", alignItems:"center", gap:5, marginBottom:3 }}>
                <div style={{ width:13, height:13, borderRadius:3, border:`2px solid ${m.color}`, background:on?m.color:"transparent", transition:"background .15s" }}/>
                <span style={{ fontSize:12, fontWeight:600, color:"#374151" }}>{m.label}</span>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:5, paddingLeft:18 }}>
                <svg width="18" height="3"><line x1="0" y1="1.5" x2="18" y2="1.5" stroke={m.color} strokeWidth="2"/></svg>
                <span style={{ fontSize:11, color:"#9ca3af", fontVariantNumeric:"tabular-nums" }}>{m.fmt(totals[m.key])}</span>
              </div>
            </button>
          );
        })}
      </div>
      <SvgChart data={CHART_DATA} metrics={visible}/>
    </div>
  );
}

  const T = ({l,c,a}) => <Th label={l} col={c} sort={sort} onSort={onSort} align={a||"right"}/>;
  return (
    <>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:20 }}>
        <h1 style={{ fontSize:22, fontWeight:700, color:"#111827", letterSpacing:"-0.4px" }}>Campaigns</h1>
        <div style={{ display:"flex", gap:8 }}>
          <button onClick={()=>setShowChart(v=>!v)} style={{ display:"flex", alignItems:"center", gap:6, padding:"7px 13px", borderRadius:7, border:"1px solid #d1d5db", background:"#fff", fontSize:12, fontWeight:500, color:"#374151" }}>
            {showChart ? "Hide chart" : "Show chart"}
          </button>
          <button style={{ padding:"7px 16px", borderRadius:7, border:"none", background:"#4F7942", fontSize:13, fontWeight:600, color:"#fff" }}>+ Create campaign</button>

      </div>
      {showChart && <CampaignChart activeMetrics={activeMetrics} onToggle={toggleMetric}/>}
      <TableHeader title="Campaigns" count={CAMPAIGNS.length}/>
      <TableShell>
        <thead><tr>
          <T l="Advertiser" c="advertiser" a="left"/><T l="Campaign" c="name" a="left"/><T l="Goal" c="goal" a="left"/>
          <T l="Budget" c="budget"/><T l="Start" c="start" a="left"/><T l="End" c="end" a="left"/>
          <T l="Spend" c="spend"/><T l="Impressions" c="impressions"/><T l="CPM" c="cpm"/>

        <tbody>
          {sortRows(CAMPAIGNS).map(r=>(

              <td style={{ padding:"9px 14px", fontWeight:600, whiteSpace:"nowrap", color:"#111827" }}>{r.name}</td>

              <Td>{f$(r.spend)}</Td><Td>{r.impressions}</Td><Td>{r.cpm}</Td>
              <Td>{r.purchases.toLocaleString()}</Td><Td>{r.leads.toLocaleString()}</Td><Td>{f$(r.revenue)}</Td>
            </TRow>
          ))}
        </tbody>
      </TableShell>
    </>
  );
}

function StrategiesTable() {
  const { sort, onSort, sortRows } = useSort("name");
  const T = ({l,c,a}) => <Th label={l} col={c} sort={sort} onSort={onSort} align={a||"right"}/>;
  return (
    <>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:20 }}>
        <h1 style={{ fontSize:22, fontWeight:700, color:"#111827", letterSpacing:"-0.4px" }}>Strategies</h1>
        <button style={{ padding:"7px 16px", borderRadius:7, border:"none", background:"#4F7942", fontSize:13, fontWeight:600, color:"#fff" }}>+ Create strategy</button>
      </div>
      <TableHeader title="Strategies" count={STRATEGIES.length}/>
      <TableShell>
        <thead><tr>
          <T l="Campaign" c="campaign" a="left"/><T l="Strategy" c="name" a="left"/><T l="Goal" c="goal" a="left"/>
          <T l="Spend" c="spend"/><T l="Impressions" c="impressions"/><T l="CPM" c="cpm"/>
          <T l="Purchases" c="purchases"/><T l="Leads" c="leads"/><T l="Revenue" c="revenue"/>
        </tr></thead>
        <tbody>
          {sortRows(STRATEGIES).map(r=>(
            <TRow key={r.id}>
              <Td align="left" muted>{r.campaign}</Td>
              <td style={{ padding:"9px 14px", fontWeight:600, whiteSpace:"nowrap", color:"#111827" }}>{r.name}</td>
              <td style={{ padding:"9px 14px" }}><Badge goal={r.goal}/></td>
              <Td>{f$(r.spend)}</Td><Td>{r.impressions}</Td><Td>{r.cpm}</Td>
              <Td>{r.purchases}</Td><Td>{r.leads}</Td><Td>{f$(r.revenue)}</Td>
            </TRow>
          ))}
        </tbody>
      </TableShell>
    </>
  );
}

function CreativesTable() {
  const { sort, onSort, sortRows } = useSort("name");
  const T = ({l,c,a}) => <Th label={l} col={c} sort={sort} onSort={onSort} align={a||"right"}/>;
  return (
    <>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:20 }}>
        <h1 style={{ fontSize:22, fontWeight:700, color:"#111827", letterSpacing:"-0.4px" }}>Creatives</h1>
        <button style={{ padding:"7px 16px", borderRadius:7, border:"none", background:"#4F7942", fontSize:13, fontWeight:600, color:"#fff" }}>+ Upload creative</button>
      </div>
      <TableHeader title="Creatives" count={CREATIVES.length}/>
      <TableShell>
        <thead><tr>
          <T l="Campaign" c="campaign" a="left"/><T l="Strategy" c="strategy" a="left"/>
          <T l="Creative" c="name" a="left"/><T l="Format" c="format" a="left"/>
          <T l="Spend" c="spend"/><T l="Impressions" c="impressions"/><T l="CPM" c="cpm"/><T l="HH Freq" c="hhFreq"/>
        </tr></thead>
        <tbody>
          {sortRows(CREATIVES).map(r=>(
            <TRow key={r.id}>
              <Td align="left" muted>{r.campaign}</Td><Td align="left" muted>{r.strategy}</Td>
              <td style={{ padding:"9px 14px", fontFamily:"monospace", fontSize:11, fontWeight:600, whiteSpace:"nowrap", color:"#111827" }}>{r.name}</td>
              <Td align="left" muted>{r.format}</Td>
              <Td>{f$(r.spend)}</Td><Td>{r.impressions}</Td><Td>{r.cpm}</Td><Td>{r.hhFreq}</Td>
            </TRow>
          ))}
        </tbody>
      </TableShell>
    </>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────

const NAV = [
  { id:"campaigns",  label:"Campaigns",  icon:"📢" },
  { id:"strategies", label:"Strategies", icon:"🎯" },
  { id:"creatives",  label:"Creatives",  icon:"🎬" },
];

function App() {
  const [active, setActive] = useState("campaigns");
  return (
    <div style={{ display:"flex", minHeight:"100vh", background:"#f9f9f7" }}>
      <div style={{ width:220, flexShrink:0, background:"#eeeee8", borderRight:"1px solid #e0e0d8", padding:"20px 12px", display:"flex", flexDirection:"column", gap:2 }}>
        <div style={{ fontFamily:"Georgia,serif", fontSize:28, fontWeight:700, color:"#4F7942", textAlign:"center", marginBottom:24, letterSpacing:"-0.5px" }}>Bronco</div>
        <div style={{ fontSize:9.5, fontWeight:700, letterSpacing:"0.09em", textTransform:"uppercase", color:"#9ca3af", padding:"0 10px", marginBottom:6 }}>Advertising</div>
        {NAV.map(item => {
          const on = active===item.id;
          return (
            <button key={item.id} onClick={()=>setActive(item.id)}
              style={{ display:"flex", alignItems:"center", gap:10, padding:"8px 12px", borderRadius:8, border:"none", background:on?"rgba(79,121,66,0.13)":"transparent", width:"100%", textAlign:"left", transition:"background .12s" }}
              onMouseEnter={e=>{ if(!on) e.currentTarget.style.background="rgba(0,0,0,0.05)"; }}
              onMouseLeave={e=>{ if(!on) e.currentTarget.style.background="transparent"; }}>
              <span style={{ fontSize:15 }}>{item.icon}</span>
              <span style={{ fontSize:13, fontWeight:on?600:400, color:on?"#4F7942":"#374151" }}>{item.label}</span>
              {on && <div style={{ marginLeft:"auto", width:5, height:5, borderRadius:"50%", background:"#4F7942" }}/>}
            </button>
          );
        })}
        <div style={{ marginTop:16, borderTop:"1px solid #d9d9d0", paddingTop:14 }}>
          <div style={{ fontSize:9.5, fontWeight:700, letterSpacing:"0.09em", textTransform:"uppercase", color:"#9ca3af", padding:"0 10px", marginBottom:6 }}>Other</div>
          {[{label:"Dashboard",icon:"▦"},{label:"Settings",icon:"⚙️"}].map(item=>(
            <button key={item.label} style={{ display:"flex", alignItems:"center", gap:10, padding:"8px 12px", borderRadius:8, border:"none", background:"transparent", width:"100%", textAlign:"left", color:"#374151", fontSize:13 }}
              onMouseEnter={e=>e.currentTarget.style.background="rgba(0,0,0,0.05)"}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <span>{item.icon}</span>{item.label}
            </button>
          ))}
        </div>
      </div>
      <div style={{ flex:1, padding:"28px 32px", overflow:"auto" }}>
        {active==="campaigns"  && <CampaignsTable/>}
        {active==="strategies" && <StrategiesTable/>}
        {active==="creatives"  && <CreativesTable/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
